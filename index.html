<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械百科助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: rgba(255, 255, 255, 0.98); padding: 20px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
        .header-icon { width: 55px; height: 55px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .header-text h1 { font-size: 22px; color: #333; font-weight: 700; }
        .header-text p { font-size: 13px; color: #666; margin-top: 3px; }
        .chat-container { flex: 1; padding: 20px; display: flex; justify-content: center; overflow: hidden; }
        .chat-wrapper { width: 100%; max-width: 900px; height: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .message.user .message-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message.assistant .message-avatar { background: #f0f2f5; }
        .message-content { padding: 15px 20px; border-radius: 18px; line-height: 1.8; font-size: 15px; }
        .message.user .message-content { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-right-radius: 4px; }
        .message.assistant .message-content { background: #f0f2f5; color: #333; border-bottom-left-radius: 4px; }
        .message.typing .message-content { background: #f0f2f5; color: #999; }
        .input-area { padding: 20px; background: #f9fafb; border-top: 1px solid #eee; }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .input-box { flex: 1; border: 2px solid #e5e7eb; border-radius: 16px; padding: 14px 18px; font-size: 15px; outline: none; transition: border-color 0.3s; font-family: inherit; resize: none; min-height: 50px; max-height: 120px; }
        .input-box:focus { border-color: #667eea; }
        .send-btn { width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 14px; color: white; font-size: 22px; cursor: pointer; transition: transform 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .welcome { text-align: center; padding: 60px 20px; color: #666; }
        .welcome-icon { font-size: 80px; margin-bottom: 20px; }
        .welcome h2 { font-size: 24px; color: #333; margin-bottom: 15px; }
        .welcome p { font-size: 15px; line-height: 1.8; }
        .welcome .domains { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 25px; }
        .welcome .domain-tag { background: #f0f2f5; padding: 8px 16px; border-radius: 20px; font-size: 13px; color: #667eea; }
        .error-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #fee; color: #c33; padding: 12px 24px; border-radius: 10px; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; display: none; }
        .footer { text-align: center; padding: 12px; color: rgba(255,255,255,0.7); font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">⚙️</div>
        <div class="header-text">
            <h1>机械百科助手</h1>
            <p>课程项目 · 涵盖八大机械工程领域</p>
        </div>
    </div>
    <div class="chat-container">
        <div class="chat-wrapper">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome">
                    <div class="welcome-icon">⚙️</div>
                    <h2>欢迎使用机械百科助手</h2>
                    <p>我可以帮你解答机械工程领域的各种问题<br>包括知识讲解、习题解答、学习指导等</p>
                    <div class="domains">
                        <span class="domain-tag">机械原理</span>
                        <span class="domain-tag">机械设计</span>
                        <span class="domain-tag">机械制图</span>
                        <span class="domain-tag">液压传动</span>
                        <span class="domain-tag">材料力学</span>
                        <span class="domain-tag">理论力学</span>
                        <span class="domain-tag">弹性力学</span>
                        <span class="domain-tag">流体动力学</span>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-box" id="userInput" placeholder="输入你的问题..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">机械百科助手 · 课程项目展示</div>
    <div class="error-toast" id="errorToast"></div>
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const errorToast = document.getElementById('errorToast');
        let isLoading = false;
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isLoading) return;
            addMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';
            showTyping();
            isLoading = true;
            sendBtn.disabled = true;
            try {
                const response = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message }) });
                const data = await response.json();
                removeTyping();
                if (response.ok) { addMessage('assistant', data.response); } else { showError(data.error || '服务器错误'); }
            } catch (error) { removeTyping(); showError('无法连接服务器，请确保已启动后端服务'); }
            isLoading = false;
            sendBtn.disabled = false;
        }
        function addMessage(role, content) {
            const welcome = chatMessages.querySelector('.welcome');
            if (welcome) welcome.remove();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + role;
            const avatar = role === 'user' ? '👤' : '⚙️';
            messageDiv.innerHTML = '<div class="message-avatar">' + avatar + '</div><div class="message-content">' + formatContent(content) + '</div>';
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function showTyping() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant typing';
            messageDiv.id = 'typingIndicator';
            messageDiv.innerHTML = '<div class="message-avatar">⚙️</div><div class="message-content">思考中，请稍候...</div>';
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function removeTyping() { const typing = document.getElementById('typingIndicator'); if (typing) typing.remove(); }
        function formatContent(content) {
            let html = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
            return html;
        }
        function showError(msg) { errorToast.textContent = msg; errorToast.style.display = 'block'; setTimeout(() => { errorToast.style.display = 'none'; }, 5000); }
        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
        window.onload = function() { userInput.focus(); };
    </script>
</body>
</html>
